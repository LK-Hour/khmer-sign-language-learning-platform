services:
  postgres:
    image: postgres:17-alpine
    container_name: khmer_sign_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: khmer_sign_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d khmer_sign_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - khmer_network

volumes:
  postgres_data:

networks:
  khmer_network:
    driver: bridge
